# Pre-commit hook configuration
# Install: pip install pre-commit
# Enable: pre-commit install
# Run: pre-commit run --all-files

repos:
  # Ruff - Fast Python code checker (alternative to Black + isort + Flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Run Ruff check
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      
      # Run Ruff formatting (alternative to Black)
      - id: ruff-format
        types_or: [python, pyi]

  # MyPy - Static type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-redis
          - types-requests
        args: [--config-file=mypy.ini]
        exclude: ^(tests/|migrations/)

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Check if there is a blank line at the end of file
      - id: end-of-file-fixer
        exclude: ^(\.idea/|\.vscode/)
      
      # Check trailing whitespace
      - id: trailing-whitespace
        exclude: ^(\.idea/|\.vscode/)
      
      # Check YAML file syntax
      - id: check-yaml
        args: [--unsafe]
      
      # Check JSON file syntax
      - id: check-json
      
      # Check TOML file syntax
      - id: check-toml
      
      # Check for merge conflict markers
      - id: check-merge-conflict
      
      # Check for debug statements
      - id: debug-statements
      
      # Check large files
      - id: check-added-large-files
        args: [--maxkb=1000]
      
      # Check Python file syntax
      - id: check-ast
      
      # Check if filename contains non-ASCII characters
      - id: check-case-conflict
      
      # Check for private keys
      - id: detect-private-key

  # Security check - Bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

# Global configuration
default_language_version:
  python: python3.8

# Excluded files and directories
exclude: |
  (?x)^(
      \.git/|
      \.mypy_cache/|
      \.pytest_cache/|
      \.ruff_cache/|
      __pycache__/|
      build/|
      dist/|
      \.venv/|
      venv/|
      \.eggs/|
      .*\.egg-info/
  )$

# Do not auto-fix when failing
fail_fast: false
