# Prometheus 配置文件
# 用于监控 Intel EC 微服务系统

global:
  scrape_interval: 15s      # 默认抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    cluster: 'intel-cw-ms'
    environment: 'development'

# Alertmanager 配置（可选）
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# 规则文件（可选）
# rule_files:
#   - "alerts/*.yml"

# 抓取配置
scrape_configs:
  # ==========================================
  # Prometheus 自身监控
  # ==========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          type: 'infrastructure'

  # ==========================================
  # Gateway Service 监控
  # ==========================================
  - job_name: 'gateway-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['gateway-service:8000']
        labels:
          service: 'gateway-service'
          type: 'microservice'
          tier: 'gateway'

  # ==========================================
  # Auth Service 监控
  # ==========================================
  - job_name: 'auth-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['auth-service:8001']
        labels:
          service: 'auth-service'
          type: 'microservice'
          tier: 'backend'

  # ==========================================
  # Admin Service 监控
  # ==========================================
  - job_name: 'admin-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['admin-service:8002']
        labels:
          service: 'admin-service'
          type: 'microservice'
          tier: 'backend'

  # ==========================================
  # Host Service 监控
  # ==========================================
  - job_name: 'host-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host-service:8003']
        labels:
          service: 'host-service'
          type: 'microservice'
          tier: 'backend'

  # ==========================================
  # Jaeger 监控
  # ==========================================
  - job_name: 'jaeger'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['jaeger:14269']
        labels:
          service: 'jaeger'
          type: 'infrastructure'

# 服务发现配置（可选，用于动态发现服务）
