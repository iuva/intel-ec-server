  # ==========================================
  # Gateway Service (API网关)
  # ==========================================
  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    image: intel-cw-ms/gateway-service:latest
    container_name: gateway-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/install/lib/python3.8/site-packages:/app
      - SERVICE_NAME=${SERVICE_NAME:-gateway-service}
      - SERVICE_PORT=${SERVICE_PORT:-8000}
      - GATEWAY_SERVICE_PORT=${GATEWAY_SERVICE_PORT:-8000}
      - SERVICE_IP=${GATEWAY_SERVICE_IP:-172.20.0.100}
      - GATEWAY_SERVICE_IP=${GATEWAY_SERVICE_IP:-gateway-service}
      - AUTH_SERVICE_IP=${AUTH_SERVICE_IP:-auth-service}
      - AUTH_SERVICE_PORT=${AUTH_SERVICE_PORT:-8001}
      - HOST_SERVICE_IP=${HOST_SERVICE_IP:-host-service}
      - HOST_SERVICE_PORT=${HOST_SERVICE_PORT:-8003}
      - MARIADB_HOST=${MARIADB_HOST:-intel-mariadb}
      - MARIADB_PORT=${MARIADB_PORT:-3306}
      - MARIADB_USER=${MARIADB_USER:-intel_user}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE:-intel_cw}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-http://nacos:8848}
      - NACOS_USERNAME=${NACOS_USERNAME:-nacos}
      - NACOS_PASSWORD=${NACOS_PASSWORD:-nacos}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-public}
      - NACOS_GROUP=${NACOS_GROUP:-DEFAULT_GROUP}
      - JAEGER_ENDPOINT=${JAEGER_ENDPOINT:-jaeger:4317}
      - ENABLE_NACOS=${ENABLE_NACOS:-true}
      - ENABLE_JAEGER=${ENABLE_JAEGER:-true}
      - ENABLE_PROMETHEUS=${ENABLE_PROMETHEUS:-true}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${GATEWAY_SERVICE_PORT:-8000}:8000"
    networks:
      intel-network:
        ipv4_address: ${GATEWAY_SERVICE_IP:-172.20.0.100}
    # depends_on:
    #   mariadb:
    #     condition: service_healthy
    #   nacos:
    #     condition: service_healthy
    #   jaeger:
    #     condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, os; urllib.request.urlopen(f'http://localhost:{os.getenv(\\'SERVICE_PORT\\', \\'8000\\')}/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # ✅ WebSocket 性能优化：增加文件描述符限制
    ulimits:
      nofile:
        soft: 4096
        hard: 8192

  # ==========================================
  # Auth Service (认证服务)
  # ==========================================
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    image: intel-cw-ms/auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/install/lib/python3.8/site-packages:/app
      - SERVICE_NAME=${AUTH_SERVICE_NAME:-auth-service}
      - SERVICE_PORT=${AUTH_SERVICE_PORT:-8001}
      - AUTH_SERVICE_PORT=${AUTH_SERVICE_PORT:-8001}
      - SERVICE_IP=${AUTH_SERVICE_IP:-172.20.0.101}
      - GATEWAY_SERVICE_IP=${GATEWAY_SERVICE_IP:-gateway-service}
      - GATEWAY_SERVICE_PORT=${GATEWAY_SERVICE_PORT:-8000}
      - AUTH_SERVICE_IP=${AUTH_SERVICE_IP:-auth-service}
      - HOST_SERVICE_IP=${HOST_SERVICE_IP:-host-service}
      - HOST_SERVICE_PORT=${HOST_SERVICE_PORT:-8003}
      - MARIADB_HOST=${MARIADB_HOST:-intel-mariadb}
      - MARIADB_PORT=${MARIADB_PORT:-3306}
      - MARIADB_USER=${MARIADB_USER:-intel_user}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE:-intel_cw}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${AUTH_REDIS_DB:-1}
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-http://nacos:8848}
      - NACOS_USERNAME=${NACOS_USERNAME:-nacos}
      - NACOS_PASSWORD=${NACOS_PASSWORD:-nacos}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-public}
      - NACOS_GROUP=${NACOS_GROUP:-DEFAULT_GROUP}
      - JAEGER_ENDPOINT=${JAEGER_ENDPOINT:-jaeger:4317}
      - ENABLE_NACOS=${ENABLE_NACOS:-true}
      - ENABLE_JAEGER=${ENABLE_JAEGER:-true}
      - ENABLE_PROMETHEUS=${ENABLE_PROMETHEUS:-true}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8001"
    networks:
      intel-network:
        ipv4_address: ${AUTH_SERVICE_IP:-172.20.0.101}
    # depends_on:
    #   mariadb:
    #     condition: service_healthy
    #   nacos:
    #     condition: service_healthy
    #   jaeger:
    #     condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${SERVICE_PORT:-8001}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Host Service (主机服务)
  # ==========================================
  host-service:
    build:
      context: .
      dockerfile: services/host-service/Dockerfile
    image: intel-cw-ms/host-service:latest
    container_name: host-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/install/lib/python3.8/site-packages:/app
      - SERVICE_NAME=${HOST_SERVICE_NAME:-host-service}
      - SERVICE_PORT=${HOST_SERVICE_PORT:-8003}
      - HOST_SERVICE_PORT=${HOST_SERVICE_PORT:-8003}
      - SERVICE_IP=${HOST_SERVICE_IP:-172.20.0.103}
      - GATEWAY_SERVICE_IP=${GATEWAY_SERVICE_IP:-gateway-service}
      - GATEWAY_SERVICE_PORT=${GATEWAY_SERVICE_PORT:-8000}
      - AUTH_SERVICE_IP=${AUTH_SERVICE_IP:-auth-service}
      - AUTH_SERVICE_PORT=${AUTH_SERVICE_PORT:-8001}
      - HOST_SERVICE_IP=${HOST_SERVICE_IP:-host-service}
      - MARIADB_HOST=${MARIADB_HOST:-intel-mariadb}
      - MARIADB_PORT=${MARIADB_PORT:-3306}
      - MARIADB_USER=${MARIADB_USER:-intel_user}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE:-intel_cw}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${HOST_REDIS_DB:-3}
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-http://nacos:8848}
      - NACOS_USERNAME=${NACOS_USERNAME:-nacos}
      - NACOS_PASSWORD=${NACOS_PASSWORD:-nacos}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-public}
      - NACOS_GROUP=${NACOS_GROUP:-DEFAULT_GROUP}
      - JAEGER_ENDPOINT=${JAEGER_ENDPOINT:-jaeger:4317}
      - ENABLE_NACOS=${ENABLE_NACOS:-true}
      - ENABLE_JAEGER=${ENABLE_JAEGER:-true}
      - ENABLE_PROMETHEUS=${ENABLE_PROMETHEUS:-true}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - USE_HARDWARE_MOCK=${USE_HARDWARE_MOCK:-false}
      - FILE_UPLOAD_DIR=${FILE_UPLOAD_DIR:-/app/uploads}
    ports:
      - "${HOST_SERVICE_PORT:-8003}:8003"
    volumes:
      # 文件上传目录挂载（确保 Docker 启动时文件不丢失）
      - host_service_uploads:/app/uploads
    networks:
      intel-network:
        ipv4_address: ${HOST_SERVICE_IP:-172.20.0.103}
    # depends_on:
    #   mariadb:
    #     condition: service_healthy
    #   nacos:
    #     condition: service_healthy
    #   jaeger:
    #     condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, os; urllib.request.urlopen(f'http://localhost:{os.getenv(\\'SERVICE_PORT\\', \\'8003\\')}/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # ✅ WebSocket 性能优化：增加文件描述符限制
    ulimits:
      nofile:
        soft: 4096
        hard: 8192

# ==========================================
# 网络配置
# ==========================================
networks:
  intel-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==========================================
# 数据卷配置
# ==========================================
volumes:
  # MariaDB 和 Redis 使用容器服务，需要数据卷
  # mariadb_data:
  #   driver: local
  # nacos_data:
  #   driver: local
  # nacos_logs:
  #   driver: local
  # prometheus_data:
  #   driver: local
  # grafana_data:
  #   driver: local
  # Host Service 文件上传目录（确保文件不丢失）
  host_service_uploads:
    driver: local
