<!DOCTYPE html>
<html>

<head>
    <title>Host WebSocket Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f5f5f5;
        }

        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            font-size: 16px;
        }

        .connected {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }

        button {
            padding: 12px 24px;
            margin: 8px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
        }

        .btn-connect {
            background: #28a745;
            color: white;
        }

        .btn-send {
            background: #007bff;
            color: white;
        }

        .btn-disconnect {
            background: #dc3545;
            color: white;
        }

        #messages {
            border: 2px solid #ddd;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            background: white;
            border-radius: 5px;
        }

        .message {
            padding: 8px;
            margin: 5px 0;
            background: #f8f9fa;
            border-left: 4px solid #007bff;
            border-radius: 3px;
            font-size: 13px;
        }

        .message.error {
            border-left-color: #dc3545;
            background: #fff5f5;
        }

        .message.success {
            border-left-color: #28a745;
            background: #f0f9f0;
        }
    </style>
</head>

<body>
    <h1>🖥️ Host WebSocket Connection Test</h1>

    <div id="status" class="status disconnected">
        ⚠️ Disconnected - Please get device Token first
    </div>

    <div>
        <input type="text" id="tokenInput" placeholder="Paste device Token"
            style="width: 500px; padding: 10px; font-size: 14px;">
        <br>
        <button class="btn-connect" onclick="connectWebSocket()">🔌 Connect</button>
        <button class="btn-send" onclick="sendHeartbeat()">💓 Send Heartbeat</button>
        <button class="btn-disconnect" onclick="disconnect()">❌ Disconnect</button>
    </div>

    <h3>📨 Message Log</h3>
    <div id="messages"></div>

    <script>
        let ws = null;

        function connectWebSocket() {
            const token = document.getElementById('tokenInput').value.trim();

            if (!token) {
                addMessage('⚠️ Please enter device Token first', 'error');
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                addMessage('⚠️ Already connected, no need to reconnect', 'error');
                return;
            }

            // ✅ Correct WebSocket path (after fix)
            const wsUrl = `ws://localhost:8000/api/v1/ws/host-service/host?token=${token}`;

            addMessage(`🔄 Connecting to: ${wsUrl}`);

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                updateStatus('✅ WebSocket Connected', true);
                addMessage('✅ WebSocket connection established successfully', 'success');

                // Automatically send first heartbeat
                setTimeout(() => sendHeartbeat(), 500);
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                addMessage(`📥 Received: ${JSON.stringify(message, null, 2)}`, 'success');

                // Process command message
                if (message.type === 'command') {
                    addMessage(`⚡ Received command: ${message.command}`);

                    // Send command response
                    const response = {
                        type: 'command_response',
                        command_id: message.command_id,
                        status: 'success',
                        result: 'Command executed successfully',
                        timestamp: Date.now()
                    };
                    ws.send(JSON.stringify(response));
                    addMessage(`📤 Sending response: ${JSON.stringify(response)}`, 'success');
                }
            };

            ws.onerror = (error) => {
                updateStatus('❌ Connection Error', false);
                addMessage(`❌ WebSocket Error: ${error.message || 'Connection failed'}`, 'error');
                console.error('WebSocket error:', error);
            };

            ws.onclose = (event) => {
                updateStatus('⚠️ Disconnected', false);
                addMessage(`⚠️ Connection closed (code: ${event.code}, reason: ${event.reason || 'Normal closure'})`);
            };
        }

        function sendHeartbeat() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('⚠️ Not connected, unable to send heartbeat', 'error');
                return;
            }

            const heartbeat = {
                type: 'heartbeat',
                data: {
                    timestamp: Date.now(),
                    source: 'web-client'
                }
            };

            ws.send(JSON.stringify(heartbeat));
            addMessage(`💓 Sending heartbeat: ${JSON.stringify(heartbeat)}`, 'success');
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
                addMessage('🔌 Actively disconnecting');
            } else {
                addMessage('⚠️ Connection not established yet', 'error');
            }
        }

        function updateStatus(text, connected) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = text;
            statusEl.className = connected ? 'status connected' : 'status disconnected';
        }

        function addMessage(text, type = '') {
            const messagesEl = document.getElementById('messages');
            const messageEl = document.createElement('div');
            messageEl.className = 'message ' + type;
            messageEl.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            messagesEl.appendChild(messageEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
    </script>
</body>

</html>
