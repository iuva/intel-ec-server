apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: intel-ec-ms
  labels:
    app: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          # Use local image, ensure imagePullPolicy allows it (or load into kind/minikube)
          image: intel-cw-ms/gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: intel-config
            - secretRef:
                name: intel-secrets
          # Explicitly set SERVICE_NAME and others if needed, but they are in ConfigMap
          # Environment variables from ConfigMap will overwrite Dockerfile ENVs if names match
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: intel-ec-ms
spec:
  type: NodePort
  selector:
    app: gateway-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30000  # Fixed nodePort for easy access
