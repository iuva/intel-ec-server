apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: host-upload-pvc
  namespace: intel-ec-ms
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: host-service
  namespace: intel-ec-ms
  labels:
    app: host-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: host-service
  template:
    metadata:
      labels:
        app: host-service
    spec:
      containers:
        - name: host-service
          image: intel-cw-ms/host-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: intel-config
            - secretRef:
                name: intel-secrets
          volumeMounts:
            - name: uploads-volume
              mountPath: /app/uploads
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: uploads-volume
          persistentVolumeClaim:
            claimName: host-upload-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: host-service
  namespace: intel-ec-ms
spec:
  selector:
    app: host-service
  ports:
    - protocol: TCP
      port: 8003
      targetPort: 8003
