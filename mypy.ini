# MyPy 类型检查配置
# 详细配置文档: https://mypy.readthedocs.io/en/stable/config_file.html

[mypy]
# Python版本
python_version = 3.8

# 基础配置
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# 严格模式配置 - 启用更严格的类型检查
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
strict_equality = True

# 导入配置
ignore_missing_imports = True
follow_imports = normal
follow_imports_for_stubs = True

# 错误报告
show_error_codes = True
show_error_context = True
show_column_numbers = True
pretty = True

# 缓存配置
cache_dir = .mypy_cache
sqlite_cache = True
incremental = True

# 排除的目录和文件
exclude = (?x)(^build/|^dist/|^\.venv/|^venv/|^\.git/|^__pycache__/|^\.mypy_cache/|^\.pytest_cache/|^\.ruff_cache/|.*_example\.py$|.*_examples\.py$)

# 第三方库配置
[mypy-nacos.*]
ignore_missing_imports = True

[mypy-loguru.*]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True

[mypy-aiomysql.*]
ignore_missing_imports = True

[mypy-asyncmy.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-passlib.*]
ignore_missing_imports = True

[mypy-jose.*]
ignore_missing_imports = True

[mypy-opentelemetry.*]
ignore_missing_imports = True

[mypy-opentelemetry.instrumentation.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

# 服务特定配置
[mypy-services.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-shared.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

# 测试文件配置
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

# 示例文件配置
[mypy-shared.common.*_example]
disallow_untyped_defs = False
disallow_incomplete_defs = False

[mypy-shared.monitoring.*_examples]
disallow_untyped_defs = False
disallow_incomplete_defs = False
